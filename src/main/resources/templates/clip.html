<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clip Composer</title>
    <style>
        /* ── Theme variables ── */
        :root {
            --bg:               #1e2130;
            --surface:          #262b3d;
            --input-bg:         #1c2030;
            --border:           #363d58;
            --text:             #dde0f0;
            --text-muted:       #8890b0;
            --label:            #606880;
            --empty:            #505570;
            --accent:           #5a9af5;
            --accent-hover:     #3d70e0;
            --tag-bg:           #1f2e52;
            --tag-text:         #6ea8fe;
            --img-bg:           #2c3148;
            --img-hover-border: #484d6a;
            --btn-sec-bg:       #363d58;
            --btn-sec-text:     #c8cad8;
            --btn-sec-hover:    #454d6e;
            --shadow:           rgba(0,0,0,0.32);
        }

        [data-theme="light"] {
            --bg:               #f0f2f5;
            --surface:          #ffffff;
            --input-bg:         #ffffff;
            --border:           #e0e0e0;
            --text:             #1a1a1a;
            --text-muted:       #555555;
            --label:            #999999;
            --empty:            #bbbbbb;
            --accent:           #0057d9;
            --accent-hover:     #0048b8;
            --tag-bg:           #e8f0fe;
            --tag-text:         #0057d9;
            --img-bg:           #eeeeee;
            --img-hover-border: #bbbbbb;
            --btn-sec-bg:       #e8eaed;
            --btn-sec-text:     #333333;
            --btn-sec-hover:    #d8dadd;
            --shadow:           rgba(0,0,0,0.08);
        }

        *, *::before, *::after { box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 16px;
            font-size: 15px;
            line-height: 1.5;
            transition: background 0.2s, color 0.2s;
        }

        .composer { max-width: 840px; margin: 0 auto; }

        /* ── Header ── */
        .clip-header {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 14px;
        }

        .clip-header-text { flex: 1; min-width: 0; }

        .clip-title {
            font-size: 1.35rem;
            font-weight: 600;
            margin: 0 0 5px;
            line-height: 1.3;
        }

        .clip-url {
            color: var(--accent);
            text-decoration: none;
            font-size: 0.82rem;
            word-break: break-all;
            display: block;
        }
        .clip-url:hover { text-decoration: underline; }

        /* ── Theme toggle ── */
        #theme-toggle {
            flex-shrink: 0;
            background: var(--btn-sec-bg);
            color: var(--btn-sec-text);
            border: none;
            border-radius: 20px;
            padding: 5px 12px;
            font-size: 0.8rem;
            font-family: inherit;
            cursor: pointer;
            transition: background 0.15s;
            margin-top: 3px;
        }
        #theme-toggle:hover { background: var(--btn-sec-hover); }

        /* ── Sections ── */
        .section {
            background: var(--surface);
            border-radius: 10px;
            padding: 14px 18px;
            margin-bottom: 12px;
            box-shadow: 0 1px 4px var(--shadow);
            transition: background 0.2s, box-shadow 0.2s;
        }

        .section-label {
            font-size: 0.68rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--label);
            margin: 0 0 10px;
        }

        .empty-notice { margin: 0; color: var(--empty); font-style: italic; font-size: 0.9rem; }

        /* ── Selected text textarea ── */
        .text-input {
            width: 100%;
            min-height: 100px;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 10px 12px;
            font-family: inherit;
            font-size: 0.9rem;
            color: var(--text);
            background: var(--input-bg);
            line-height: 1.6;
            resize: vertical;
            outline: none;
            transition: border-color 0.12s, box-shadow 0.12s, background 0.2s;
        }
        .text-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(90,154,245,0.15);
        }

        /* ── Tags ── */
        .tag-input-row {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
        }
        .tag-input {
            flex: 1;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 8px 12px;
            font-family: inherit;
            font-size: 0.875rem;
            color: var(--text);
            background: var(--input-bg);
            outline: none;
            transition: border-color 0.12s, box-shadow 0.12s, background 0.2s;
        }
        .tag-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(90,154,245,0.15);
        }
        .tag-input::placeholder { color: var(--label); }
        .tag-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            min-height: 28px;
        }
        .tag-chip {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: var(--tag-bg);
            color: var(--tag-text);
            border-radius: 100px;
            padding: 3px 8px 3px 12px;
            font-size: 0.8rem;
            font-weight: 500;
        }
        .tag-remove {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--tag-text);
            padding: 0;
            font-size: 1.1rem;
            line-height: 1;
            opacity: 0.6;
            display: flex;
            align-items: center;
        }
        .tag-remove:hover { opacity: 1; }

        /* ── Image grid ── */
        .image-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(108px, 1fr));
            gap: 8px;
        }

        .image-item {
            cursor: pointer;
            border-radius: 8px;
            overflow: hidden;
            border: 3px solid transparent;
            aspect-ratio: 1;
            background: var(--img-bg);
            transition: border-color 0.12s, box-shadow 0.12s;
            position: relative;
        }
        .image-item:hover  { border-color: var(--img-hover-border); }
        .image-item.selected {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(90,154,245,0.3);
        }
        .image-item.selected::after {
            content: '✓';
            position: absolute;
            top: 4px;
            right: 5px;
            background: var(--accent);
            color: #fff;
            font-size: 0.7rem;
            font-weight: 700;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .image-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            pointer-events: none;
        }
        .image-item.dragging  { opacity: 0.35; }
        .image-item.drag-over { outline: 2px dashed var(--accent); outline-offset: -3px; }
        .section.url-drag-over { outline: 2px dashed var(--accent); outline-offset: 4px; border-radius: 8px; }

        /* ── Related links ── */
        .related-list { display: flex; flex-direction: column; gap: 4px; }
        .related-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 10px;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            border-radius: 6px;
        }
        [data-theme="light"] .related-item { background: rgba(0,0,0,0.03); }
        .related-item-link {
            flex: 1;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            color: var(--accent);
            text-decoration: none;
            font-size: 0.85rem;
        }
        .related-item-link:hover { text-decoration: underline; }
        .related-remove {
            flex-shrink: 0;
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 1.1rem;
            padding: 0 2px;
            line-height: 1;
            font-family: inherit;
        }
        .related-remove:hover { color: #e5484d; }

        /* ── Preview card ── */
        .preview-card {
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
        }

        /* ── Preview image grid ── */
        #preview-images {
            display: none;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 3px;
            border-bottom: 1px solid var(--border);
        }

        .preview-img-item {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            display: block;
        }

        .preview-body { padding: 12px 14px; }

        .preview-title {
            font-weight: 600;
            font-size: 0.95rem;
            margin: 0 0 5px;
        }

        .preview-text {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin: 0 0 9px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            white-space: pre-wrap;
        }

        .preview-link {
            color: var(--accent);
            text-decoration: none;
            font-size: 0.82rem;
        }
        .preview-link:hover { text-decoration: underline; }

        /* ── Step nav buttons ── */
        .step-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 4px;
            margin-bottom: 16px;
        }

        .btn {
            padding: 10px 22px;
            border-radius: 7px;
            font-family: inherit;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: background 0.12s;
        }

        .btn-secondary {
            background: var(--btn-sec-bg);
            color: var(--btn-sec-text);
        }
        .btn-secondary:hover { background: var(--btn-sec-hover); }

        .btn-primary {
            background: var(--accent);
            color: #fff;
        }
        .btn-primary:hover { background: var(--accent-hover); }
    </style>
</head>
<body>
<div class="composer">

    <!-- Source header (shown on both steps) -->
    <header class="clip-header">
        <div class="clip-header-text">
            <h1 class="clip-title"
                th:text="${clip.title().isEmpty() ? '(No title)' : clip.title()}"></h1>
            <a class="clip-url"
               th:href="${clip.url()}"
               th:text="${clip.url()}"
               target="_blank"
               rel="noopener noreferrer"></a>
        </div>
        <button id="theme-toggle" onclick="toggleTheme()" title="Toggle theme"></button>
    </header>

    <!-- ═══ Step 1 ═══ -->
    <div id="step-1">

        <!-- Selected text (editable) -->
        <section class="section">
            <h2 class="section-label">Selected Text</h2>
            <textarea class="text-input"
                      id="selected-text"
                      th:text="${clip.selectedText()}"
                      placeholder="No text was selected on the source page."></textarea>
        </section>

        <!-- Meta description (only if present) -->
        <section class="section" th:if="${!clip.description().isEmpty()}">
            <h2 class="section-label">Description</h2>
            <p th:text="${clip.description()}" style="margin:0;"></p>
        </section>

        <!-- Tags -->
        <section class="section">
            <h2 class="section-label">Tags</h2>
            <div class="tag-input-row">
                <input class="tag-input"
                       id="tag-input"
                       type="text"
                       placeholder="Type a tag and press Enter or comma&hellip;">
            </div>
            <div class="tag-chips" id="tag-chips"></div>
        </section>

        <!-- Image grid -->
        <section class="section" id="image-section">
            <h2 class="section-label">Choose Image</h2>

            <div class="image-grid" th:if="${!clip.images().isEmpty()}">
                <div class="image-item"
                     th:each="img : ${clip.images()}"
                     th:attr="data-src=${img.src()},data-alt=${img.alt()},data-kind=${img.kind()}"
                     draggable="true"
                     onclick="selectImage(this)">
                    <img th:src="${img.src()}"
                         th:alt="${img.alt()}"
                         loading="lazy"
                         onload="checkImageSize(this)"
                         onerror="this.closest('.image-item').style.display='none'">
                </div>
            </div>

            <p class="empty-notice" th:if="${clip.images().isEmpty()}">No images found on the source page.</p>
        </section>

        <!-- Related Links -->
        <section class="section" id="related-section">
            <h2 class="section-label">Related Links</h2>
            <div class="related-list" id="related-list"></div>
            <p class="empty-notice" id="related-empty">Drop a link here to add related resources</p>
        </section>

        <div class="step-actions">
            <button class="btn btn-primary" onclick="goToPreview()">Next</button>
        </div>

    </div><!-- /step-1 -->

    <!-- ═══ Step 2 ═══ -->
    <div id="step-2" style="display:none">

        <section class="section">
            <h2 class="section-label">Preview</h2>
            <div class="preview-card">
                <div id="preview-images"></div>
                <div class="preview-body">
                    <p class="preview-title"
                       th:text="${!clip.ogTitle().isEmpty() ? clip.ogTitle() : clip.title()}"></p>
                    <p class="preview-text"
                       id="preview-text"
                       th:text="${!clip.selectedText().isEmpty() ? clip.selectedText() : clip.description()}"></p>
                    <a class="preview-link"
                       th:href="${clip.url()}"
                       target="_blank"
                       rel="noopener noreferrer">View original &rarr;</a>
                </div>
            </div>
        </section>

        <div class="step-actions">
            <button class="btn btn-secondary" onclick="goBack()">Back</button>
            <button class="btn btn-primary" onclick="submitClip()">Submit</button>
        </div>

    </div><!-- /step-2 -->

    <!-- All clip text for full-text search indexing -->
    <div id="clip-index-data" style="display:none" aria-hidden="true"
         th:attr="data-url=${clip.url()},data-canonical=${clip.canonicalUrl()}">
        <span class="idx-title"       th:text="${clip.title()}"></span>
        <span class="idx-og-title"    th:text="${clip.ogTitle()}"></span>
        <span class="idx-description" th:text="${clip.description()}"></span>
        <span class="idx-og-desc"     th:text="${clip.ogDescription()}"></span>
        <span class="idx-body"        th:text="${clip.selectedText()}"></span>
        <span class="idx-keywords"    th:each="kw : ${clip.keywords()}" th:text="${kw + ' '}"></span>
        <span class="idx-images"      th:each="img : ${clip.images()}"  th:text="${img.alt() + ' '}"></span>
    </div>

</div>

<script th:inline="javascript">
    /* ── Theme ── */
    var _theme = localStorage.getItem('clipper-theme') || 'dark';

    function applyTheme(t) {
        _theme = t;
        document.documentElement.setAttribute('data-theme', t === 'light' ? 'light' : '');
        document.getElementById('theme-toggle').textContent = t === 'light' ? '☾ Dark' : '☀ Light';
        localStorage.setItem('clipper-theme', t);
    }

    function toggleTheme() {
        applyTheme(_theme === 'light' ? 'dark' : 'light');
    }

    applyTheme(_theme);

    /* ── Step navigation ── */
    function goToPreview() {
        renderPreviewImages();
        document.getElementById('step-1').style.display = 'none';
        document.getElementById('step-2').style.display = 'block';
    }

    function goBack() {
        document.getElementById('step-2').style.display = 'none';
        document.getElementById('step-1').style.display = 'block';
    }

    var _clipId = /*[[${clipId}]]*/ '';

    function submitClip() {
        var payload = {
            selectedImages: _selectedImages.map(function(img, i) {
                return { src: img.src, alt: img.alt || '', kind: img.kind || '', rankOrder: i };
            }),
            selectedText: document.getElementById('selected-text').value,
            tags: _tags,
            relatedLinks: _relatedLinks
        };

        document.querySelector('#step-2 .btn-primary').disabled = true;

        fetch('/clip/' + _clipId + '/save', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        })
        .then(function(r) { return r.json().then(function(d) { return { ok: r.ok, data: d }; }); })
        .then(function(result) {
            if (result.ok) {
                window.location.href = result.data.postUrl;
            } else {
                var details = result.data.details
                    ? result.data.details.join('\n')
                    : (result.data.error || 'Save failed');
                alert('Save failed:\n' + details);
                document.querySelector('#step-2 .btn-primary').disabled = false;
            }
        })
        .catch(function(e) {
            alert('Network error: ' + e.message);
            document.querySelector('#step-2 .btn-primary').disabled = false;
        });
    }

    /* ── Image selection ── */
    var MIN_IMG_DIM = 300;
    var _selectedImages = [];

    function checkImageSize(img) {
        if (img.naturalWidth < MIN_IMG_DIM && img.naturalHeight < MIN_IMG_DIM) {
            var item = img.closest('.image-item');
            item.style.display = 'none';
            if (item.classList.contains('selected')) {
                var src = item.dataset.src || '';
                item.classList.remove('selected');
                _selectedImages = _selectedImages.filter(function (i) { return i.src !== src; });
                if (_selectedImages.length === 0) {
                    var all = document.querySelectorAll('.image-item');
                    for (var i = 0; i < all.length; i++) {
                        if (all[i].style.display !== 'none') { selectImage(all[i]); break; }
                    }
                }
            }
        }
    }

    function selectImage(el) {
        var src  = el.dataset.src  || '';
        var alt  = el.dataset.alt  || '';
        var kind = el.dataset.kind || '';

        if (el.classList.contains('selected')) {
            el.classList.remove('selected');
            _selectedImages = _selectedImages.filter(function (i) { return i.src !== src; });
        } else {
            el.classList.add('selected');
            _selectedImages.push({ src: src, alt: alt, kind: kind });
        }
    }

    function renderPreviewImages() {
        var container = document.getElementById('preview-images');
        container.innerHTML = '';

        if (_selectedImages.length === 0) {
            container.style.display = 'none';
            return;
        }

        container.style.display = 'grid';
        _selectedImages.forEach(function (image) {
            var img = document.createElement('img');
            img.src = image.src;
            img.alt = image.alt;
            img.className = 'preview-img-item';
            container.appendChild(img);
        });
    }

    /* ── Image drag-to-reorder + URL drop ── */
    (function () {
        var section = document.getElementById('image-section');
        var grid    = section.querySelector('.image-grid');
        var dragging = null;

        function clearDragOver() {
            if (grid) grid.querySelectorAll('.drag-over').forEach(function (el) { el.classList.remove('drag-over'); });
            section.classList.remove('url-drag-over');
        }

        function syncOrder() {
            _selectedImages = Array.from(grid.querySelectorAll('.image-item.selected')).map(function (el) {
                return { src: el.dataset.src || '', alt: el.dataset.alt || '', kind: el.dataset.kind || '' };
            });
        }

        function ensureGrid() {
            if (grid) return grid;
            grid = document.createElement('div');
            grid.className = 'image-grid';
            var notice = section.querySelector('.empty-notice');
            if (notice) notice.style.display = 'none';
            section.insertBefore(grid, section.querySelector('.step-actions'));
            attachGridHandlers();
            return grid;
        }

        function makeItem(url) {
            if (Array.from((grid || section).querySelectorAll('.image-item'))
                    .some(function (el) { return el.dataset.src === url; })) return null;
            var item = document.createElement('div');
            item.className = 'image-item';
            item.dataset.src  = url;
            item.dataset.alt  = '';
            item.dataset.kind = 'dropped';
            item.setAttribute('draggable', 'true');
            item.addEventListener('click', function () { selectImage(item); });
            var img = document.createElement('img');
            img.src = url;
            img.style.cssText = 'width:100%;height:100%;object-fit:cover;display:block;pointer-events:none';
            img.addEventListener('load', function () {
                checkImageSize(img);
                if (item.style.display !== 'none') selectImage(item);
            });
            img.addEventListener('error', function () { item.remove(); });
            item.appendChild(img);
            return item;
        }

        function dropUrl(e) {
            var raw = e.dataTransfer.getData('text/uri-list') || e.dataTransfer.getData('text/plain') || '';
            var url = raw.split('\n').map(function (l) { return l.trim(); })
                         .find(function (l) { return /^https?:\/\//i.test(l) && !l.startsWith('#'); });
            if (!url) return;
            e.preventDefault();
            var g = ensureGrid();
            var item = makeItem(url);
            if (item) g.appendChild(item);
        }

        function isUrlDrag(e) {
            return !dragging && Array.from(e.dataTransfer.types)
                .some(function (t) { return t === 'text/uri-list' || t === 'text/plain'; });
        }

        /* ── Section-level: URL drops (works even with no grid yet) ── */
        section.addEventListener('dragover', function (e) {
            if (!isUrlDrag(e)) return;
            e.preventDefault();
            section.classList.add('url-drag-over');
        });
        section.addEventListener('dragleave', function (e) {
            if (!section.contains(e.relatedTarget)) clearDragOver();
        });
        section.addEventListener('drop', function (e) {
            clearDragOver();
            if (!isUrlDrag(e)) return;
            dropUrl(e);
        });

        /* ── Grid-level: reorder items ── */
        function attachGridHandlers() {
            grid.addEventListener('dragstart', function (e) {
                dragging = e.target.closest('.image-item');
                if (!dragging) return;
                e.dataTransfer.effectAllowed = 'move';
                setTimeout(function () { if (dragging) dragging.classList.add('dragging'); }, 0);
            });

            grid.addEventListener('dragover', function (e) {
                if (isUrlDrag(e)) return; // handled by section
                e.preventDefault();
                var target = e.target.closest('.image-item');
                if (!target || target === dragging) return;
                grid.querySelectorAll('.drag-over').forEach(function (el) { el.classList.remove('drag-over'); });
                target.classList.add('drag-over');
            });

            grid.addEventListener('drop', function (e) {
                var target = e.target.closest('.image-item');
                grid.querySelectorAll('.drag-over').forEach(function (el) { el.classList.remove('drag-over'); });
                if (!dragging) return; // URL drop: bubbles up to section handler
                e.preventDefault();
                if (!target || target === dragging) return;
                var rect = target.getBoundingClientRect();
                grid.insertBefore(dragging, e.clientX < rect.left + rect.width / 2 ? target : target.nextSibling);
                syncOrder();
            });

            grid.addEventListener('dragend', function () {
                clearDragOver();
                if (dragging) { dragging.classList.remove('dragging'); dragging = null; }
            });
        }

        if (grid) attachGridHandlers();
    }());

    /* ── Tag input ── */
    var _tags = /*[[${clip.keywords()}]]*/ [];

    function addTag(raw) {
        raw.split(',').forEach(function (part) {
            var tag = part.trim().toLowerCase();
            if (tag && !_tags.includes(tag)) { _tags.push(tag); }
        });
        renderTags();
    }

    function removeTag(tag) {
        _tags = _tags.filter(function (t) { return t !== tag; });
        renderTags();
    }

    function renderTags() {
        var container = document.getElementById('tag-chips');
        container.innerHTML = '';
        _tags.forEach(function (tag) {
            var chip = document.createElement('span');
            chip.className = 'tag-chip';
            var label = document.createTextNode(tag);
            var btn = document.createElement('button');
            btn.className = 'tag-remove';
            btn.textContent = '×';
            btn.setAttribute('aria-label', 'Remove ' + tag);
            btn.addEventListener('click', function () { removeTag(tag); });
            chip.appendChild(label);
            chip.appendChild(btn);
            container.appendChild(chip);
        });
    }

    renderTags();

    var _allItems = document.querySelectorAll('.image-item');
    if (_allItems.length > 1) selectImage(_allItems[1]);
    else if (_allItems.length === 1) selectImage(_allItems[0]);

    var tagInput = document.getElementById('tag-input');

    tagInput.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' || e.key === ',') {
            e.preventDefault();
            if (this.value.trim()) { addTag(this.value); this.value = ''; }
        }
    });

    tagInput.addEventListener('blur', function () {
        if (this.value.trim()) { addTag(this.value); this.value = ''; }
    });

    /* ── Related links ── */
    var _relatedLinks = /*[[${clip.relatedLinks()}]]*/ [];

    function renderRelatedLinks() {
        var list  = document.getElementById('related-list');
        var empty = document.getElementById('related-empty');
        list.innerHTML = '';
        _relatedLinks.forEach(function (link, i) {
            var item = document.createElement('div');
            item.className = 'related-item';

            var a = document.createElement('a');
            a.href = link.url;
            a.target = '_blank';
            a.rel = 'noopener noreferrer';
            a.className = 'related-item-link';
            var lbl = link.title || link.url;
            a.textContent = lbl.length > 30 ? lbl.slice(0, 30) + '…' : lbl;
            a.title = link.url;

            var btn = document.createElement('button');
            btn.className = 'related-remove';
            btn.textContent = '×';
            btn.setAttribute('aria-label', 'Remove link');
            (function (idx) {
                btn.addEventListener('click', function () {
                    _relatedLinks.splice(idx, 1);
                    renderRelatedLinks();
                });
            }(i));

            item.appendChild(a);
            item.appendChild(btn);
            list.appendChild(item);
        });
        empty.style.display = _relatedLinks.length ? 'none' : '';
    }

    (function () {
        var rs = document.getElementById('related-section');

        rs.addEventListener('dragover', function (e) {
            var types = Array.from(e.dataTransfer.types);
            if (!types.some(function (t) { return t === 'text/uri-list' || t === 'text/plain'; })) return;
            e.preventDefault();
            rs.classList.add('url-drag-over');
        });
        rs.addEventListener('dragleave', function (e) {
            if (!rs.contains(e.relatedTarget)) rs.classList.remove('url-drag-over');
        });
        rs.addEventListener('drop', function (e) {
            rs.classList.remove('url-drag-over');
            var raw = e.dataTransfer.getData('text/uri-list') || e.dataTransfer.getData('text/plain') || '';
            var url = raw.split('\n').map(function (l) { return l.trim(); })
                         .find(function (l) { return /^https?:\/\//i.test(l) && !l.startsWith('#'); });
            if (!url) return;
            e.preventDefault();
            if (_relatedLinks.some(function (l) { return l.url === url; })) return;
            _relatedLinks.push({ url: url, title: '' });
            renderRelatedLinks();
            fetch('/api/fetch-title?url=' + encodeURIComponent(url))
                .then(function (r) { return r.json(); })
                .then(function (d) {
                    var entry = _relatedLinks.find(function (l) { return l.url === url; });
                    if (entry && d.title) { entry.title = d.title; renderRelatedLinks(); }
                })
                .catch(function () {});
        });
    }());

    renderRelatedLinks();
</script>
</body>
</html>
