<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit — Clipper</title>
    <style>
        :root {
            --bg:               #1e2130;
            --surface:          #262b3d;
            --input-bg:         #1c2030;
            --border:           #363d58;
            --text:             #dde0f0;
            --text-muted:       #8890b0;
            --label:            #606880;
            --accent:           #5a9af5;
            --accent-hover:     #3d70e0;
            --tag-bg:           #1f2e52;
            --tag-text:         #6ea8fe;
            --btn-sec-bg:       #363d58;
            --btn-sec-text:     #c8cad8;
            --btn-sec-hover:    #454d6e;
            --shadow:           rgba(0,0,0,0.32);
            --img-bg:           #2c3148;
        }
        [data-theme="light"] {
            --bg:               #f0f2f5;
            --surface:          #ffffff;
            --input-bg:         #ffffff;
            --border:           #e0e0e0;
            --text:             #1a1a1a;
            --text-muted:       #555555;
            --label:            #999999;
            --accent:           #0057d9;
            --accent-hover:     #0048b8;
            --tag-bg:           #e8f0fe;
            --tag-text:         #0057d9;
            --btn-sec-bg:       #e8eaed;
            --btn-sec-text:     #333333;
            --btn-sec-hover:    #d8dadd;
            --shadow:           rgba(0,0,0,0.08);
            --img-bg:           #eeeeee;
        }
        *, *::before, *::after { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 16px;
            font-size: 15px;
            line-height: 1.5;
        }
        .editor { max-width: 840px; margin: 0 auto; }

        .edit-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 18px;
        }
        .edit-header h1 {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-muted);
            margin: 0;
            flex: 1;
        }
        .site-title {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.95rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: var(--text-muted);
            text-decoration: none;
        }
        .site-title:hover { color: var(--text); }
        .site-title svg { flex-shrink: 0; }
        #theme-toggle {
            background: var(--btn-sec-bg);
            color: var(--btn-sec-text);
            border: none;
            border-radius: 20px;
            padding: 5px 12px;
            font-size: 0.8rem;
            font-family: inherit;
            cursor: pointer;
        }
        #theme-toggle:hover { background: var(--btn-sec-hover); }

        .section {
            background: var(--surface);
            border-radius: 10px;
            padding: 14px 18px;
            margin-bottom: 12px;
            box-shadow: 0 1px 4px var(--shadow);
        }
        .section-label {
            font-size: 0.68rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--label);
            margin: 0 0 10px;
        }

        .text-input {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 10px 12px;
            font-family: inherit;
            font-size: 0.9rem;
            color: var(--text);
            background: var(--input-bg);
            line-height: 1.6;
            outline: none;
            transition: border-color 0.12s, box-shadow 0.12s;
        }
        .text-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(90,154,245,0.15);
        }
        textarea.text-input {
            min-height: 140px;
            resize: vertical;
        }

        /* ── Tags ── */
        .tag-input-row { display: flex; gap: 8px; margin-bottom: 10px; }
        .tag-input {
            flex: 1;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 8px 12px;
            font-family: inherit;
            font-size: 0.875rem;
            color: var(--text);
            background: var(--input-bg);
            outline: none;
            transition: border-color 0.12s, box-shadow 0.12s;
        }
        .tag-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(90,154,245,0.15);
        }
        .tag-input::placeholder { color: var(--label); }
        .tag-chips { display: flex; flex-wrap: wrap; gap: 6px; min-height: 28px; }
        .tag-chip {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: var(--tag-bg);
            color: var(--tag-text);
            border-radius: 100px;
            padding: 3px 8px 3px 12px;
            font-size: 0.8rem;
            font-weight: 500;
        }
        .tag-remove {
            background: none; border: none; cursor: pointer;
            color: var(--tag-text); padding: 0; font-size: 1.1rem;
            line-height: 1; opacity: 0.6; display: flex; align-items: center;
        }
        .tag-remove:hover { opacity: 1; }

        /* ── Image grid ── */
        .img-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 8px;
        }
        .img-tile {
            position: relative;
            cursor: pointer;
            border-radius: 6px;
            overflow: hidden;
            aspect-ratio: 1;
            background: var(--img-bg);
            border: 3px solid transparent;
            transition: border-color 0.12s;
        }
        .img-tile.selected { border-color: var(--accent); }
        .img-tile img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            pointer-events: none;
        }
        .img-tile.dragging  { opacity: 0.35; }
        .img-tile.drag-over { outline: 2px dashed var(--accent); outline-offset: -3px; }
        .section.url-drag-over { outline: 2px dashed var(--accent); outline-offset: 4px; border-radius: 8px; }

        /* ── Related links ── */
        .empty-notice { color: var(--text-muted); font-size: 0.85rem; margin: 8px 0 0; font-style: italic; }
        .related-list { display: flex; flex-direction: column; gap: 4px; }
        .related-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 10px;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            border-radius: 6px;
        }
        [data-theme="light"] .related-item { background: rgba(0,0,0,0.03); }
        .related-item-link {
            flex: 1;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            color: var(--accent);
            text-decoration: none;
            font-size: 0.85rem;
        }
        .related-item-link:hover { text-decoration: underline; }
        .related-remove {
            flex-shrink: 0;
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 1.1rem;
            padding: 0 2px;
            line-height: 1;
            font-family: inherit;
        }
        .related-remove:hover { color: #e5484d; }
        .img-check {
            position: absolute;
            top: 6px;
            right: 6px;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: var(--accent);
            color: #fff;
            font-size: 13px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.12s;
            pointer-events: none;
        }
        .img-tile.selected .img-check { opacity: 1; }

        .img-section-head {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }
        .img-section-label {
            font-size: 0.68rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--label);
        }

        .btn-fetch {
            padding: 5px 12px;
            background: var(--btn-sec-bg);
            color: var(--btn-sec-text);
            border: 1px solid var(--border);
            border-radius: 20px;
            font-family: inherit;
            font-size: 0.8rem;
            cursor: pointer;
            transition: background 0.12s;
        }
        .btn-fetch:hover { background: var(--btn-sec-hover); }
        .btn-fetch:disabled { opacity: 0.5; cursor: default; }

        .source-status {
            font-size: 0.78rem;
            color: var(--text-muted);
            margin-bottom: 8px;
            min-height: 1.2em;
        }

        /* ── Actions ── */
        .actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 4px;
            margin-bottom: 8px;
        }
        .btn {
            padding: 10px 22px;
            border-radius: 7px;
            font-family: inherit;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: background 0.12s;
            text-decoration: none;
            display: inline-block;
        }
        .btn-secondary { background: var(--btn-sec-bg); color: var(--btn-sec-text); }
        .btn-secondary:hover { background: var(--btn-sec-hover); }
        .btn-primary { background: var(--accent); color: #fff; }
        .btn-primary:hover { background: var(--accent-hover); }

        .save-error {
            color: #f87171;
            font-size: 0.85rem;
            text-align: right;
            display: none;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
<div class="editor">

    <header class="edit-header">
        <a class="site-title" href="/" title="Home">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 26 18" fill="currentColor" aria-hidden="true" style="width:1.4em;height:1em">
                <path d="M1 14L3 18H23L25 14H1Z"/>
                <rect x="11" y="0" width="1.5" height="14"/>
                <rect x="16.5" y="3" width="1.5" height="11"/>
                <path d="M11 1L11 13L3 12Z"/>
                <path d="M12.5 1L12.5 13L16.5 12L16.5 4Z"/>
                <path d="M18 4L18 13L23 12Z"/>
            </svg>
            Clipper
        </a>
        <h1>Edit clip</h1>
        <button id="theme-toggle" onclick="toggleTheme()"></button>
    </header>

    <section class="section">
        <h2 class="section-label">Title</h2>
        <input class="text-input" type="text" id="title-input"
               th:value="${!post.ogTitle().isEmpty() ? post.ogTitle() : post.title()}">
    </section>

    <section class="section">
        <h2 class="section-label">Description</h2>
        <textarea class="text-input" id="text-input"
                  th:text="${post.selectedText()}"></textarea>
    </section>

    <section class="section">
        <h2 class="section-label">Tags</h2>
        <div class="tag-input-row">
            <input class="tag-input" id="tag-input" type="text"
                   placeholder="Type a tag and press Enter or comma&hellip;">
        </div>
        <div class="tag-chips" id="tag-chips"></div>
    </section>

    <section class="section" id="images-section">
        <h2 class="section-label">Images</h2>

        <!-- Cached images -->
        <div class="img-section-head">
            <span class="img-section-label">Saved</span>
        </div>
        <div class="img-grid" id="cached-grid">
            <th:block th:each="img : ${post.images()}"
                      th:if="${'cached'.equals(img.cacheStatus())}">
                <div class="img-tile"
                     th:classappend="${img.selected()} ? ' selected'"
                     th:attr="data-img-id=${img.id()}"
                     draggable="true"
                     onclick="this.classList.toggle('selected')">
                    <img th:src="${img.effectiveImageUrl()}"
                         th:alt="${img.altText()}"
                         onerror="this.closest('.img-tile').style.display='none'">
                    <div class="img-check">&#10003;</div>
                </div>
            </th:block>
        </div>

        <!-- Source images -->
        <div class="img-section-head" style="margin-top:16px;">
            <span class="img-section-label">From source</span>
            <button class="btn-fetch" id="fetch-btn" type="button" onclick="fetchSource()">&#8635; Fetch</button>
        </div>
        <div class="source-status" id="source-status"></div>
        <div class="img-grid" id="source-grid"></div>
    </section>

    <section class="section" id="related-section">
        <h2 class="section-label">Related Links</h2>
        <div class="related-list" id="related-list"></div>
        <p class="empty-notice" id="related-empty">Drop a link here to add related resources</p>
    </section>

    <div class="actions">
        <a class="btn btn-secondary" th:href="@{/post/{id}(id=${post.id()})}">Cancel</a>
        <button class="btn btn-primary" type="button" onclick="saveEdit()">Save</button>
    </div>
    <div class="save-error" id="save-error"></div>

</div>

<script th:inline="javascript">
    /* ── Theme ── */
    var _theme = localStorage.getItem('clipper-theme') || 'dark';
    function applyTheme(t) {
        _theme = t;
        document.documentElement.setAttribute('data-theme', t === 'light' ? 'light' : '');
        document.getElementById('theme-toggle').textContent = t === 'light' ? '☾ Dark' : '☀ Light';
        localStorage.setItem('clipper-theme', t);
    }
    function toggleTheme() { applyTheme(_theme === 'light' ? 'dark' : 'light'); }
    applyTheme(_theme);

    /* ── Tags ── */
    var _tags = /*[[${post.tags()}]]*/ [];
    var _postId = /*[[${post.id()}]]*/ '';

    function addTag(raw) {
        raw.split(',').forEach(function(part) {
            var tag = part.trim().toLowerCase();
            if (tag && !_tags.includes(tag)) _tags.push(tag);
        });
        renderTags();
    }
    function removeTag(tag) {
        _tags = _tags.filter(function(t) { return t !== tag; });
        renderTags();
    }
    function renderTags() {
        var container = document.getElementById('tag-chips');
        container.innerHTML = '';
        _tags.forEach(function(tag) {
            var chip = document.createElement('span');
            chip.className = 'tag-chip';
            var label = document.createTextNode(tag);
            var btn   = document.createElement('button');
            btn.className   = 'tag-remove';
            btn.type        = 'button';
            btn.textContent = '×';
            btn.setAttribute('aria-label', 'Remove ' + tag);
            btn.addEventListener('click', function() { removeTag(tag); });
            chip.appendChild(label);
            chip.appendChild(btn);
            container.appendChild(chip);
        });
    }
    renderTags();

    var tagInput = document.getElementById('tag-input');
    tagInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' || e.key === ',') {
            e.preventDefault();
            if (this.value.trim()) { addTag(this.value); this.value = ''; }
        }
    });
    tagInput.addEventListener('blur', function() {
        if (this.value.trim()) { addTag(this.value); this.value = ''; }
    });

    /* ── Image drag helpers ── */
    function isUrlDrag(e) {
        return Array.from(e.dataTransfer.types)
            .some(function(t) { return t === 'text/uri-list' || t === 'text/plain'; });
    }

    function makeTile(src, alt, idx) {
        var tile = document.createElement('div');
        tile.className = 'img-tile';
        tile.dataset.idx = String(idx);
        tile.setAttribute('draggable', 'true');
        tile.onclick = function() { tile.classList.toggle('selected'); };
        var im = document.createElement('img');
        im.src = src;
        im.alt = alt || '';
        im.onerror = function() { tile.style.display = 'none'; };
        var chk = document.createElement('div');
        chk.className = 'img-check';
        chk.textContent = '✓';
        tile.appendChild(im);
        tile.appendChild(chk);
        return tile;
    }

    function attachImageDrag(grid) {
        var dragging = null;
        grid.addEventListener('dragstart', function(e) {
            dragging = e.target.closest('.img-tile');
            if (!dragging) return;
            e.dataTransfer.effectAllowed = 'move';
            setTimeout(function() { if (dragging) dragging.classList.add('dragging'); }, 0);
        });
        grid.addEventListener('dragover', function(e) {
            if (isUrlDrag(e)) return;
            e.preventDefault();
            var target = e.target.closest('.img-tile');
            if (!target || target === dragging) return;
            grid.querySelectorAll('.drag-over').forEach(function(el) { el.classList.remove('drag-over'); });
            target.classList.add('drag-over');
        });
        grid.addEventListener('drop', function(e) {
            var target = e.target.closest('.img-tile');
            grid.querySelectorAll('.drag-over').forEach(function(el) { el.classList.remove('drag-over'); });
            if (!dragging) return;
            e.preventDefault();
            if (!target || target === dragging) return;
            var rect = target.getBoundingClientRect();
            grid.insertBefore(dragging, e.clientX < rect.left + rect.width / 2 ? target : target.nextSibling);
        });
        grid.addEventListener('dragend', function() {
            grid.querySelectorAll('.drag-over').forEach(function(el) { el.classList.remove('drag-over'); });
            if (dragging) { dragging.classList.remove('dragging'); dragging = null; }
        });
    }

    attachImageDrag(document.getElementById('cached-grid'));

    /* ── Source image fetch + URL drop ── */
    var _sourceImages = [];

    function fetchSource() {
        var btn    = document.getElementById('fetch-btn');
        var status = document.getElementById('source-status');
        var grid   = document.getElementById('source-grid');
        btn.disabled = true;
        status.textContent = 'Fetching…';
        grid.innerHTML = '';
        _sourceImages = [];

        fetch('/post/' + _postId + '/source-images')
            .then(function(r) {
                if (!r.ok) return r.json().then(function(e) { throw new Error(e.error || 'Fetch failed'); });
                return r.json();
            })
            .then(function(imgs) {
                _sourceImages = imgs;
                status.textContent = imgs.length + ' image' + (imgs.length === 1 ? '' : 's') + ' found';
                imgs.forEach(function(img, i) { grid.appendChild(makeTile(img.src, img.alt, i)); });
                if (!grid._dragAttached) { attachImageDrag(grid); grid._dragAttached = true; }
                btn.disabled = false;
            })
            .catch(function(e) {
                status.textContent = 'Error: ' + e.message;
                btn.disabled = false;
            });
    }

    (function () {
        var sec = document.getElementById('images-section');
        sec.addEventListener('dragover', function(e) {
            if (!isUrlDrag(e)) return;
            e.preventDefault();
            sec.classList.add('url-drag-over');
        });
        sec.addEventListener('dragleave', function(e) {
            if (!sec.contains(e.relatedTarget)) sec.classList.remove('url-drag-over');
        });
        sec.addEventListener('drop', function(e) {
            sec.classList.remove('url-drag-over');
            if (!isUrlDrag(e)) return;
            var raw = e.dataTransfer.getData('text/uri-list') || e.dataTransfer.getData('text/plain') || '';
            var url = raw.split('\n').map(function(l) { return l.trim(); })
                         .find(function(l) { return /^https?:\/\//i.test(l) && !l.startsWith('#'); });
            if (!url) return;
            e.preventDefault();
            if (_sourceImages.some(function(i) { return i.src === url; })) return;
            var idx = _sourceImages.length;
            _sourceImages.push({ src: url, alt: '', kind: 'dropped' });
            var grid = document.getElementById('source-grid');
            var tile = makeTile(url, '', idx);
            tile.classList.add('selected');
            grid.appendChild(tile);
            if (!grid._dragAttached) { attachImageDrag(grid); grid._dragAttached = true; }
        });
    }());

    /* ── Related links ── */
    var _relatedLinks = /*[[${post.relatedLinks()}]]*/ [];

    function renderRelatedLinks() {
        var list  = document.getElementById('related-list');
        var empty = document.getElementById('related-empty');
        list.innerHTML = '';
        _relatedLinks.forEach(function(link, i) {
            var item = document.createElement('div');
            item.className = 'related-item';
            var a = document.createElement('a');
            a.href = link.url;
            a.target = '_blank';
            a.rel = 'noopener noreferrer';
            a.className = 'related-item-link';
            var lbl = link.title || link.url;
            a.textContent = lbl.length > 30 ? lbl.slice(0, 30) + '…' : lbl;
            a.title = link.url;
            var btn = document.createElement('button');
            btn.type = 'button';
            btn.className = 'related-remove';
            btn.textContent = '×';
            btn.setAttribute('aria-label', 'Remove link');
            (function(idx) {
                btn.addEventListener('click', function() { _relatedLinks.splice(idx, 1); renderRelatedLinks(); });
            }(i));
            item.appendChild(a);
            item.appendChild(btn);
            list.appendChild(item);
        });
        empty.style.display = _relatedLinks.length ? 'none' : '';
    }

    (function() {
        var rs = document.getElementById('related-section');
        rs.addEventListener('dragover', function(e) {
            var types = Array.from(e.dataTransfer.types);
            if (!types.some(function(t) { return t === 'text/uri-list' || t === 'text/plain'; })) return;
            e.preventDefault();
            rs.classList.add('url-drag-over');
        });
        rs.addEventListener('dragleave', function(e) {
            if (!rs.contains(e.relatedTarget)) rs.classList.remove('url-drag-over');
        });
        rs.addEventListener('drop', function(e) {
            rs.classList.remove('url-drag-over');
            var raw = e.dataTransfer.getData('text/uri-list') || e.dataTransfer.getData('text/plain') || '';
            var url = raw.split('\n').map(function(l) { return l.trim(); })
                         .find(function(l) { return /^https?:\/\//i.test(l) && !l.startsWith('#'); });
            if (!url) return;
            e.preventDefault();
            if (_relatedLinks.some(function(l) { return l.url === url; })) return;
            _relatedLinks.push({ url: url, title: '' });
            renderRelatedLinks();
            fetch('/api/fetch-title?url=' + encodeURIComponent(url))
                .then(function(r) { return r.json(); })
                .then(function(d) {
                    var entry = _relatedLinks.find(function(l) { return l.url === url; });
                    if (entry && d.title) { entry.title = d.title; renderRelatedLinks(); }
                })
                .catch(function() {});
        });
    }());

    renderRelatedLinks();

    /* ── Save ── */
    function saveEdit() {
        var keepIds = [];
        document.querySelectorAll('#cached-grid .img-tile.selected').forEach(function(t) {
            keepIds.push(t.dataset.imgId);
        });

        var newImages = [];
        var ri = 0;
        document.querySelectorAll('#source-grid .img-tile.selected').forEach(function(t) {
            var cand = _sourceImages[parseInt(t.dataset.idx, 10)];
            if (cand) newImages.push({ src: cand.src, alt: cand.alt || '', kind: cand.kind, rankOrder: ri++ });
        });

        var body = {
            title:        document.getElementById('title-input').value,
            selectedText: document.getElementById('text-input').value,
            tags:         _tags.slice(),
            keepImageIds: keepIds,
            newImages:    newImages,
            relatedLinks: _relatedLinks
        };

        var errEl = document.getElementById('save-error');
        errEl.style.display = 'none';

        fetch('/post/' + _postId + '/edit', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        })
        .then(function(r) {
            if (!r.ok) return r.json().then(function(e) { throw new Error(e.error || 'Save failed'); });
            return r.json();
        })
        .then(function(data) { window.location.href = data.postUrl; })
        .catch(function(e) {
            errEl.textContent = e.message;
            errEl.style.display = 'block';
        });
    }
</script>
