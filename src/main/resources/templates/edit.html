<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit — Clipper</title>
    <style>
        :root {
            --bg:               #1e2130;
            --surface:          #262b3d;
            --input-bg:         #1c2030;
            --border:           #363d58;
            --text:             #dde0f0;
            --text-muted:       #8890b0;
            --label:            #606880;
            --accent:           #5a9af5;
            --accent-hover:     #3d70e0;
            --tag-bg:           #1f2e52;
            --tag-text:         #6ea8fe;
            --btn-sec-bg:       #363d58;
            --btn-sec-text:     #c8cad8;
            --btn-sec-hover:    #454d6e;
            --shadow:           rgba(0,0,0,0.32);
            --img-bg:           #2c3148;
        }
        [data-theme="light"] {
            --bg:               #f0f2f5;
            --surface:          #ffffff;
            --input-bg:         #ffffff;
            --border:           #e0e0e0;
            --text:             #1a1a1a;
            --text-muted:       #555555;
            --label:            #999999;
            --accent:           #0057d9;
            --accent-hover:     #0048b8;
            --tag-bg:           #e8f0fe;
            --tag-text:         #0057d9;
            --btn-sec-bg:       #e8eaed;
            --btn-sec-text:     #333333;
            --btn-sec-hover:    #d8dadd;
            --shadow:           rgba(0,0,0,0.08);
            --img-bg:           #eeeeee;
        }
        *, *::before, *::after { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 16px;
            font-size: 15px;
            line-height: 1.5;
        }
        .editor { max-width: 840px; margin: 0 auto; }

        .edit-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 18px;
        }
        .edit-header h1 {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-muted);
            margin: 0;
            flex: 1;
        }
        .btn-home {
            flex-shrink: 0;
            background: none;
            color: var(--text-muted);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 5px 12px;
            font-size: 0.8rem;
            font-family: inherit;
            cursor: pointer;
            text-decoration: none;
        }
        .btn-home:hover { color: var(--text); border-color: var(--text-muted); }
        #theme-toggle {
            background: var(--btn-sec-bg);
            color: var(--btn-sec-text);
            border: none;
            border-radius: 20px;
            padding: 5px 12px;
            font-size: 0.8rem;
            font-family: inherit;
            cursor: pointer;
        }
        #theme-toggle:hover { background: var(--btn-sec-hover); }

        .section {
            background: var(--surface);
            border-radius: 10px;
            padding: 14px 18px;
            margin-bottom: 12px;
            box-shadow: 0 1px 4px var(--shadow);
        }
        .section-label {
            font-size: 0.68rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--label);
            margin: 0 0 10px;
        }

        .text-input {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 10px 12px;
            font-family: inherit;
            font-size: 0.9rem;
            color: var(--text);
            background: var(--input-bg);
            line-height: 1.6;
            outline: none;
            transition: border-color 0.12s, box-shadow 0.12s;
        }
        .text-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(90,154,245,0.15);
        }
        textarea.text-input {
            min-height: 140px;
            resize: vertical;
        }

        /* ── Tags ── */
        .tag-input-row { display: flex; gap: 8px; margin-bottom: 10px; }
        .tag-input {
            flex: 1;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 8px 12px;
            font-family: inherit;
            font-size: 0.875rem;
            color: var(--text);
            background: var(--input-bg);
            outline: none;
            transition: border-color 0.12s, box-shadow 0.12s;
        }
        .tag-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(90,154,245,0.15);
        }
        .tag-input::placeholder { color: var(--label); }
        .tag-chips { display: flex; flex-wrap: wrap; gap: 6px; min-height: 28px; }
        .tag-chip {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: var(--tag-bg);
            color: var(--tag-text);
            border-radius: 100px;
            padding: 3px 8px 3px 12px;
            font-size: 0.8rem;
            font-weight: 500;
        }
        .tag-remove {
            background: none; border: none; cursor: pointer;
            color: var(--tag-text); padding: 0; font-size: 1.1rem;
            line-height: 1; opacity: 0.6; display: flex; align-items: center;
        }
        .tag-remove:hover { opacity: 1; }

        /* ── Image grid ── */
        .img-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 8px;
        }
        .img-tile {
            position: relative;
            cursor: pointer;
            border-radius: 6px;
            overflow: hidden;
            aspect-ratio: 1;
            background: var(--img-bg);
            border: 3px solid transparent;
            transition: border-color 0.12s;
        }
        .img-tile.selected { border-color: var(--accent); }
        .img-tile img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .img-check {
            position: absolute;
            top: 6px;
            right: 6px;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: var(--accent);
            color: #fff;
            font-size: 13px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.12s;
            pointer-events: none;
        }
        .img-tile.selected .img-check { opacity: 1; }

        .img-section-head {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }
        .img-section-label {
            font-size: 0.68rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--label);
        }

        .btn-fetch {
            padding: 5px 12px;
            background: var(--btn-sec-bg);
            color: var(--btn-sec-text);
            border: 1px solid var(--border);
            border-radius: 20px;
            font-family: inherit;
            font-size: 0.8rem;
            cursor: pointer;
            transition: background 0.12s;
        }
        .btn-fetch:hover { background: var(--btn-sec-hover); }
        .btn-fetch:disabled { opacity: 0.5; cursor: default; }

        .source-status {
            font-size: 0.78rem;
            color: var(--text-muted);
            margin-bottom: 8px;
            min-height: 1.2em;
        }

        /* ── Actions ── */
        .actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 4px;
            margin-bottom: 8px;
        }
        .btn {
            padding: 10px 22px;
            border-radius: 7px;
            font-family: inherit;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: background 0.12s;
            text-decoration: none;
            display: inline-block;
        }
        .btn-secondary { background: var(--btn-sec-bg); color: var(--btn-sec-text); }
        .btn-secondary:hover { background: var(--btn-sec-hover); }
        .btn-primary { background: var(--accent); color: #fff; }
        .btn-primary:hover { background: var(--accent-hover); }

        .save-error {
            color: #f87171;
            font-size: 0.85rem;
            text-align: right;
            display: none;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
<div class="editor">

    <header class="edit-header">
        <a class="btn-home" href="/">Home</a>
        <h1>Edit clip</h1>
        <button id="theme-toggle" onclick="toggleTheme()"></button>
    </header>

    <section class="section">
        <h2 class="section-label">Title</h2>
        <input class="text-input" type="text" id="title-input"
               th:value="${!post.ogTitle().isEmpty() ? post.ogTitle() : post.title()}">
    </section>

    <section class="section">
        <h2 class="section-label">Body Text</h2>
        <textarea class="text-input" id="text-input"
                  th:text="${post.selectedText()}"></textarea>
    </section>

    <section class="section">
        <h2 class="section-label">Tags</h2>
        <div class="tag-input-row">
            <input class="tag-input" id="tag-input" type="text"
                   placeholder="Type a tag and press Enter or comma&hellip;">
        </div>
        <div class="tag-chips" id="tag-chips"></div>
    </section>

    <section class="section">
        <h2 class="section-label">Images</h2>

        <!-- Cached images -->
        <div class="img-section-head">
            <span class="img-section-label">Saved</span>
        </div>
        <div class="img-grid" id="cached-grid">
            <th:block th:each="img : ${post.images()}"
                      th:if="${'cached'.equals(img.cacheStatus())}">
                <div class="img-tile"
                     th:classappend="${img.selected()} ? ' selected'"
                     th:attr="data-img-id=${img.id()}"
                     onclick="this.classList.toggle('selected')">
                    <img th:src="${img.effectiveImageUrl()}"
                         th:alt="${img.altText()}"
                         onerror="this.closest('.img-tile').style.display='none'">
                    <div class="img-check">&#10003;</div>
                </div>
            </th:block>
        </div>

        <!-- Source images -->
        <div class="img-section-head" style="margin-top:16px;">
            <span class="img-section-label">From source</span>
            <button class="btn-fetch" id="fetch-btn" type="button" onclick="fetchSource()">&#8635; Fetch</button>
        </div>
        <div class="source-status" id="source-status"></div>
        <div class="img-grid" id="source-grid"></div>
    </section>

    <div class="actions">
        <a class="btn btn-secondary" th:href="@{/post/{id}(id=${post.id()})}">Cancel</a>
        <button class="btn btn-primary" type="button" onclick="saveEdit()">Save</button>
    </div>
    <div class="save-error" id="save-error"></div>

</div>

<script th:inline="javascript">
    /* ── Theme ── */
    var _theme = localStorage.getItem('clipper-theme') || 'dark';
    function applyTheme(t) {
        _theme = t;
        document.documentElement.setAttribute('data-theme', t === 'light' ? 'light' : '');
        document.getElementById('theme-toggle').textContent = t === 'light' ? '☾ Dark' : '☀ Light';
        localStorage.setItem('clipper-theme', t);
    }
    function toggleTheme() { applyTheme(_theme === 'light' ? 'dark' : 'light'); }
    applyTheme(_theme);

    /* ── Tags ── */
    var _tags = /*[[${post.tags()}]]*/ [];
    var _postId = /*[[${post.id()}]]*/ '';

    function addTag(raw) {
        raw.split(',').forEach(function(part) {
            var tag = part.trim().toLowerCase();
            if (tag && !_tags.includes(tag)) _tags.push(tag);
        });
        renderTags();
    }
    function removeTag(tag) {
        _tags = _tags.filter(function(t) { return t !== tag; });
        renderTags();
    }
    function renderTags() {
        var container = document.getElementById('tag-chips');
        container.innerHTML = '';
        _tags.forEach(function(tag) {
            var chip = document.createElement('span');
            chip.className = 'tag-chip';
            var label = document.createTextNode(tag);
            var btn   = document.createElement('button');
            btn.className   = 'tag-remove';
            btn.type        = 'button';
            btn.textContent = '×';
            btn.setAttribute('aria-label', 'Remove ' + tag);
            btn.addEventListener('click', function() { removeTag(tag); });
            chip.appendChild(label);
            chip.appendChild(btn);
            container.appendChild(chip);
        });
    }
    renderTags();

    var tagInput = document.getElementById('tag-input');
    tagInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' || e.key === ',') {
            e.preventDefault();
            if (this.value.trim()) { addTag(this.value); this.value = ''; }
        }
    });
    tagInput.addEventListener('blur', function() {
        if (this.value.trim()) { addTag(this.value); this.value = ''; }
    });

    /* ── Source image fetch ── */
    var _sourceImages = [];

    function fetchSource() {
        var btn    = document.getElementById('fetch-btn');
        var status = document.getElementById('source-status');
        var grid   = document.getElementById('source-grid');
        btn.disabled = true;
        status.textContent = 'Fetching…';
        grid.innerHTML = '';
        _sourceImages = [];

        fetch('/post/' + _postId + '/source-images')
            .then(function(r) {
                if (!r.ok) return r.json().then(function(e) { throw new Error(e.error || 'Fetch failed'); });
                return r.json();
            })
            .then(function(imgs) {
                _sourceImages = imgs;
                status.textContent = imgs.length + ' image' + (imgs.length === 1 ? '' : 's') + ' found';
                imgs.forEach(function(img, i) {
                    var tile = document.createElement('div');
                    tile.className = 'img-tile';
                    tile.dataset.idx = i;
                    tile.onclick = function() { tile.classList.toggle('selected'); };
                    var im = document.createElement('img');
                    im.src = img.src;
                    im.alt = img.alt || '';
                    im.onerror = function() { tile.style.display = 'none'; };
                    var chk = document.createElement('div');
                    chk.className = 'img-check';
                    chk.textContent = '✓';
                    tile.appendChild(im);
                    tile.appendChild(chk);
                    grid.appendChild(tile);
                });
                btn.disabled = false;
            })
            .catch(function(e) {
                status.textContent = 'Error: ' + e.message;
                btn.disabled = false;
            });
    }

    /* ── Save ── */
    function saveEdit() {
        var keepIds = [];
        document.querySelectorAll('#cached-grid .img-tile.selected').forEach(function(t) {
            keepIds.push(t.dataset.imgId);
        });

        var newImages = [];
        document.querySelectorAll('#source-grid .img-tile.selected').forEach(function(t) {
            var cand = _sourceImages[parseInt(t.dataset.idx, 10)];
            if (cand) newImages.push({ src: cand.src, alt: cand.alt || '', kind: cand.kind, rankOrder: 0 });
        });

        var body = {
            title:        document.getElementById('title-input').value,
            selectedText: document.getElementById('text-input').value,
            tags:         _tags.slice(),
            keepImageIds: keepIds,
            newImages:    newImages
        };

        var errEl = document.getElementById('save-error');
        errEl.style.display = 'none';

        fetch('/post/' + _postId + '/edit', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        })
        .then(function(r) {
            if (!r.ok) return r.json().then(function(e) { throw new Error(e.error || 'Save failed'); });
            return r.json();
        })
        .then(function(data) { window.location.href = data.postUrl; })
        .catch(function(e) {
            errEl.textContent = e.message;
            errEl.style.display = 'block';
        });
    }
</script>
</body>
</html>
