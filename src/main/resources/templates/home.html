<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clipper</title>
    <style>
        :root {
            --bg:          #1e2130;
            --surface:     #262b3d;
            --border:      #363d58;
            --text:        #dde0f0;
            --text-muted:  #8890b0;
            --label:       #606880;
            --accent:      #5a9af5;
            --accent-hover:#3d70e0;
            --tag-bg:      #1f2e52;
            --tag-text:    #6ea8fe;
            --img-bg:      #2c3148;
            --shadow:      rgba(0,0,0,0.32);
            --empty:       #505570;
        }
        [data-theme="light"] {
            --bg:          #f0f2f5;
            --surface:     #ffffff;
            --border:      #e0e0e0;
            --text:        #1a1a1a;
            --text-muted:  #555555;
            --label:       #999999;
            --accent:      #0057d9;
            --accent-hover:#0048b8;
            --tag-bg:      #e8f0fe;
            --tag-text:    #0057d9;
            --img-bg:      #eeeeee;
            --shadow:      rgba(0,0,0,0.08);
            --empty:       #bbbbbb;
        }
        *, *::before, *::after { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0 16px 40px;
            font-size: 15px;
            line-height: 1.5;
        }

        /* ── Top bar ── */
        .topbar-wrapper {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--bg);
            padding: 20px 0 12px;
            margin: 0 -16px 24px;
            padding-left: 16px;
            padding-right: 16px;
        }
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            max-width: 1100px;
            margin: 0 auto;
        }
        .topbar-title {
            display: flex;
            align-items: center;
            gap: 7px;
            font-size: 1.3rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin: 0;
            color: var(--text);
            text-decoration: none;
        }
        .topbar-title svg { flex-shrink: 0; }
        .search-form {
            flex: 1;
            max-width: 400px;
            display: flex;
        }
        .search-input {
            flex: 1;
            border: 1px solid var(--border);
            border-radius: 20px 0 0 20px;
            padding: 5px 14px;
            font-family: inherit;
            font-size: 0.85rem;
            color: var(--text);
            background: var(--surface);
            outline: none;
            transition: border-color 0.12s;
        }
        .search-input:focus { border-color: var(--accent); }
        .search-input::placeholder { color: var(--label); }
        .search-input::-webkit-search-cancel-button { display: none; }
        .clear-btn {
            display: none;
            align-items: center;
            border: 1px solid var(--border);
            border-left: none;
            border-right: none;
            padding: 5px 9px;
            font-size: 0.8rem;
            line-height: 1;
            cursor: pointer;
            background: var(--surface);
            color: var(--text-muted);
            transition: color 0.12s;
        }
        .clear-btn:hover { color: var(--text); }
        .search-btn {
            border: 1px solid var(--border);
            border-left: none;
            border-radius: 0 20px 20px 0;
            padding: 5px 14px;
            font-family: inherit;
            font-size: 0.85rem;
            cursor: pointer;
            background: var(--surface);
            color: var(--text-muted);
            transition: color 0.12s;
        }
        .search-btn:hover { color: var(--text); }

        #theme-toggle {
            background: var(--surface);
            color: var(--text-muted);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 5px 12px;
            font-size: 0.8rem;
            font-family: inherit;
            cursor: pointer;
        }
        #theme-toggle:hover { color: var(--text); }

        #copy-bookmarklet {
            background: var(--surface);
            color: var(--text-muted);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 0.8rem;
            font-family: inherit;
            cursor: pointer;
        }
        #copy-bookmarklet:hover { color: var(--accent); border-color: var(--accent); }

        /* ── Card grid ── */
        .grid {
            display: grid;
            gap: 14px;
            max-width: 1100px;
            margin: 0 auto;
            grid-template-columns: repeat(2, 1fr);
        }
        .grid[data-cols="1"] { grid-template-columns: calc((100% - 14px) / 2 * 1.2); justify-content: center; }
        .grid[data-cols="2"] { grid-template-columns: repeat(2, 1fr); }
        .grid[data-cols="3"] { grid-template-columns: repeat(3, 1fr); }

        /* ── Column switcher ── */
        .col-switcher {
            display: flex;
            border: 1px solid var(--border);
            border-radius: 20px;
            overflow: hidden;
        }
        .col-btn {
            background: var(--surface);
            color: var(--text-muted);
            border: none;
            border-right: 1px solid var(--border);
            padding: 5px 10px;
            font-size: 0.8rem;
            font-family: inherit;
            cursor: pointer;
            line-height: 1;
            min-width: 28px;
        }
        .col-btn:last-child { border-right: none; }
        .col-btn:hover { color: var(--text); background: var(--bg); }
        .col-btn.active { background: var(--accent); color: #fff; }

        /* ── Card ── */
        .card {
            background: var(--surface);
            border-radius: 10px;
            box-shadow: 0 1px 4px var(--shadow);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            cursor: pointer;
            transition: box-shadow 0.15s, transform 0.15s;
        }
        .card:hover {
            box-shadow: 0 4px 16px var(--shadow);
            transform: translateY(-2px);
        }

        .card-image {
            width: 100%;
            aspect-ratio: 16 / 9;
            object-fit: cover;
            display: block;
            background: var(--img-bg);
        }

        .card-image-placeholder {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: var(--img-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--label);
            font-size: 2rem;
        }

        .card-body {
            padding: 14px 16px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .card-title {
            font-size: 0.95rem;
            font-weight: 600;
            margin: 0;
            line-height: 1.35;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-excerpt {
            font-size: 0.83rem;
            color: var(--text-muted);
            margin: 0;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            white-space: pre-wrap;
            flex: 1;
        }

        .card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
        }
        .card-tag {
            background: var(--tag-bg);
            color: var(--tag-text);
            border-radius: 100px;
            padding: 2px 9px;
            font-size: 0.73rem;
            font-weight: 500;
            white-space: nowrap;
            text-decoration: none;
        }
        .card-tag:hover { opacity: 0.75; }

        .card-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 16px 14px;
            border-top: 1px solid var(--border);
        }

        .card-actions {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-edit {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 1.25rem;
            line-height: 1;
        }
        .card-edit:hover { color: var(--accent); }

        .card-delete {
            background: none;
            border: none;
            padding: 0;
            color: var(--text-muted);
            font-size: 1.25rem;
            line-height: 1;
            cursor: pointer;
        }
        .card-delete:hover { color: #e5484d; }

        .card-date {
            font-size: 0.73rem;
            color: var(--label);
            white-space: nowrap;
            flex-shrink: 0;
        }

        /* ── Empty state ── */
        .empty {
            max-width: 1100px;
            margin: 60px auto;
            text-align: center;
            color: var(--empty);
        }
        .empty-icon { font-size: 3rem; margin-bottom: 12px; }
        .empty-heading { font-size: 1.1rem; font-weight: 600; margin: 0 0 6px; color: var(--text-muted); }
        .empty-body { font-size: 0.9rem; margin: 0; }
    </style>
</head>
<body>

<div class="topbar-wrapper">
<div class="topbar">
    <a class="topbar-title" href="/" title="Home">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 26 18" fill="currentColor" aria-hidden="true" style="width:1.5em;height:1em">
            <path d="M1 14L3 18H23L25 14H1Z"/>
            <rect x="11" y="0" width="1.5" height="14"/>
            <rect x="16.5" y="3" width="1.5" height="11"/>
            <path d="M11 1L11 13L3 12Z"/>
            <path d="M12.5 1L12.5 13L16.5 12L16.5 4Z"/>
            <path d="M18 4L18 13L23 12Z"/>
        </svg>
        Clipper
    </a>
    <form class="search-form" action="/" method="get">
        <input class="search-input" id="search-input" type="search" name="q"
               th:value="${q}"
               placeholder="Search clips&hellip;"
               autocomplete="off">
        <button class="clear-btn" id="search-clear" type="button" aria-label="Clear search">&#x2715;</button>
        <button class="search-btn" type="submit" aria-label="Search">&#x2315;</button>
    </form>
    <div class="col-switcher" id="col-switcher">
        <button class="col-btn" data-cols="1" title="1 column">1</button>
        <button class="col-btn" data-cols="2" title="2 columns">2</button>
        <button class="col-btn" data-cols="3" title="3 columns">3</button>
    </div>
    <button id="theme-toggle" onclick="toggleTheme()"></button>
    <button id="copy-bookmarklet" type="button">Copy bookmarklet</button>
</div>
</div>

<!-- Card list -->
<div class="grid" th:if="${!posts.isEmpty()}">
    <div class="card"
         th:each="post : ${posts}"
         th:onclick="|window.location='@{/post/{id}(id=${post.id()})}'|"
         role="link" tabindex="0"
         th:attr="aria-label=${!post.ogTitle().isEmpty() ? post.ogTitle() : post.title()}">

        <!-- Primary image -->
        <img class="card-image"
             th:if="${post.primaryImage() != null}"
             th:src="${post.primaryImage().effectiveImageUrl()}"
             th:alt="${post.primaryImage().altText()}"
             loading="lazy"
             onerror="this.style.display='none'">
        <div class="card-image-placeholder"
             th:if="${post.primaryImage() == null}">&#128203;</div>

        <div class="card-body">
            <h2 class="card-title"
                th:text="${!post.ogTitle().isEmpty() ? post.ogTitle() : post.title()}"></h2>

            <p class="card-excerpt"
               th:if="${!post.selectedText().isEmpty()}"
               th:text="${post.selectedText()}"></p>
            <p class="card-excerpt"
               th:if="${post.selectedText().isEmpty() && !post.description().isEmpty()}"
               th:text="${post.description()}"></p>

            <div class="card-tags" th:if="${!post.tags().isEmpty()}">
                <a class="card-tag"
                   th:each="tag : ${post.tags()}"
                   th:href="@{/(q=${tag})}"
                   onclick="event.stopPropagation()"
                   th:text="${tag}"></a>
            </div>
        </div>

        <div class="card-footer">
            <span class="card-date"
                  th:with="d=${(!post.updatedAt().isEmpty() ? post.updatedAt() : post.createdAt())}"
                  th:text="${d.length() >= 10 ? d.substring(0, 10) : ''}"></span>
            <div class="card-actions">
                <a class="card-edit"
                   th:href="@{/post/{id}/edit(id=${post.id()})}"
                   onclick="event.stopPropagation()"
                   title="Edit">&#9998;</a>
                <button class="card-delete"
                        type="button"
                        th:attr="data-post-id=${post.id()}"
                        onclick="event.stopPropagation(); deleteCard(this)"
                        title="Delete">&#128465;</button>
            </div>
        </div>
    </div>
</div>

<!-- Empty state: search returned nothing -->
<div class="empty" th:if="${posts.isEmpty() && !q.isEmpty()}">
    <div class="empty-icon">&#128269;</div>
    <p class="empty-heading">No results for &ldquo;<span th:text="${q}"></span>&rdquo;</p>
    <p class="empty-body"><a href="/">Clear search</a></p>
</div>

<!-- Empty state: no clips at all -->
<div class="empty" th:if="${posts.isEmpty() && q.isEmpty()}">
    <div class="empty-icon">&#128203;</div>
    <p class="empty-heading">No clips saved yet</p>
    <p class="empty-body">Copy the bookmarklet below and add it to your browser's bookmarks bar.</p>
</div>

<script>
    (function () {
        var base = window.location.origin;
        // Open the window immediately (user-gesture context) so popup blockers
        // can't interfere. clipper.js navigates the same named window to the
        // full compose page if it loads. On CSP-restricted sites (YouTube,
        // SharePoint) the script fails to load and the window stays at quick clip.
        // DOM reads (querySelector, getSelection) are never blocked by CSP.
        var bm = 'javascript:(function(){'
            + 'var _b=' + JSON.stringify(base) + ';'
            + 'var gm=function(n){var el=document.querySelector("meta[name=\\""+n+"\\"],meta[property=\\""+n+"\\"]");return el?(el.getAttribute("content")||""):""};'
            + 'var _u=encodeURIComponent(location.href);'
            + 'var _t=encodeURIComponent(document.title||"");'
            + 'var _s=encodeURIComponent((window.getSelection&&window.getSelection().toString())||"");'
            + 'var _ogt=encodeURIComponent(gm("og:title"));'
            + 'var _desc=encodeURIComponent((gm("description")||gm("og:description")).substring(0,500));'
            + 'var _cu=encodeURIComponent((document.querySelector("link[rel=\\"canonical\\"]")||{href:""}).href);'
            + 'var kws=[],seen={};'
            + 'var addKw=function(s){if(!s)return;String(s).split(/[,;]+/).forEach(function(k){k=k.trim().toLowerCase();if(k&&k.length<=100&&!seen[k]){seen[k]=1;kws.push(k);}});};'
            + 'addKw(gm("keywords"));addKw(gm("news_keywords"));addKw(gm("article:section"));'
            + 'try{[].slice.call(document.querySelectorAll("meta[property=\\"article:tag\\"]")).forEach(function(e){addKw(e.getAttribute("content"));});}catch(e){}'
            + 'var imgs=[],imgSeen={};'
            + 'var addImg=function(u){if(!u||imgSeen[u]||imgs.length>=8)return;imgSeen[u]=1;imgs.push(u);};'
            + 'addImg(gm("twitter:image"));addImg(gm("twitter:image:src"));'
            + 'try{[].slice.call(document.querySelectorAll("meta[property=\\"og:image\\"]")).forEach(function(e){addImg(e.getAttribute("content")||"");});}catch(e){}'
            + 'try{[].slice.call(document.querySelectorAll("script[type=\\"application/ld+json\\"]")).forEach(function(e){try{var d=JSON.parse(e.textContent||"");(Array.isArray(d)?d:[d]).forEach(function(it){if(it&&it.keywords)addKw(typeof it.keywords==="string"?it.keywords:it.keywords.join(","));if(it&&it.genre)addKw(typeof it.genre==="string"?it.genre:it.genre.join(","));if(it&&it.thumbnailUrl){var tn=it.thumbnailUrl;(Array.isArray(tn)?tn:[tn]).forEach(addImg);}});}catch(ex){}});}catch(e){}'
            + 'var _kw=encodeURIComponent(kws.slice(0,30).join(","));'
            + 'var _imgP=imgs.map(function(u){return"img="+encodeURIComponent(u);}).join("&");'
            + 'window.__clipper_win=window.open(_b+"/clip/quick?url="+_u+"&title="+_t+"&text="+_s+"&ogTitle="+_ogt+(_imgP?"&"+_imgP:"")+"&desc="+_desc+"&kw="+_kw+"&cu="+_cu,"bb_clip","width=900,height=720,scrollbars=yes,resizable=yes");'
            + 'var el=document.createElement("script");'
            + 'el.src=_b+"/clipper.js";'
            + 'document.head.appendChild(el);'
            + '})()';

        var btn = document.getElementById('copy-bookmarklet');
        btn.addEventListener('click', function () {
            navigator.clipboard.writeText(bm).then(function () {
                btn.textContent = 'Copied!';
                setTimeout(function () { btn.textContent = 'Copy bookmarklet'; }, 2000);
            });
        });
    }());

    var _theme = localStorage.getItem('clipper-theme') || 'dark';
    function applyTheme(t) {
        _theme = t;
        document.documentElement.setAttribute('data-theme', t === 'light' ? 'light' : '');
        document.getElementById('theme-toggle').textContent = t === 'light' ? '☾ Dark' : '☀ Light';
        localStorage.setItem('clipper-theme', t);
    }
    function toggleTheme() { applyTheme(_theme === 'light' ? 'dark' : 'light'); }
    applyTheme(_theme);

    /* ── Column switcher ── */
    function setCols(n) {
        var grid = document.querySelector('.grid');
        if (grid) grid.dataset.cols = n;
        document.querySelectorAll('.col-btn').forEach(function(b) {
            b.classList.toggle('active', parseInt(b.dataset.cols, 10) === n);
        });
        localStorage.setItem('clipper-cols', n);
    }
    document.querySelectorAll('.col-btn').forEach(function(b) {
        b.addEventListener('click', function() { setCols(parseInt(b.dataset.cols, 10)); });
    });
    setCols(parseInt(localStorage.getItem('clipper-cols') || '2', 10));

    /* ── Search: clear button + auto-focus ── */
    var searchInput = document.getElementById('search-input');
    var clearBtn    = document.getElementById('search-clear');

    function updateClear() {
        clearBtn.style.display = searchInput.value ? 'flex' : 'none';
    }

    clearBtn.addEventListener('click', function() {
        window.location.href = '/';
    });

    searchInput.addEventListener('input', updateClear);
    updateClear();

    if (searchInput.value.trim()) searchInput.focus();

    /* ── Delete card ── */
    function deleteCard(btn) {
        var postId = btn.dataset.postId;
        if (!confirm('Delete this clip? This cannot be undone.')) return;
        fetch('/post/' + postId + '/delete', { method: 'POST' })
            .then(function(r) {
                if (!r.ok) throw new Error('Delete failed');
                var card = btn.closest('.card');
                if (card) card.remove();
                if (!document.querySelector('.card')) location.reload();
            })
            .catch(function() { alert('Failed to delete. Please try again.'); });
    }
</script>
</body>
</html>
