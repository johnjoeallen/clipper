<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clipper</title>
    <style>
        :root {
            --bg:          #1e2130;
            --surface:     #262b3d;
            --border:      #363d58;
            --text:        #dde0f0;
            --text-muted:  #8890b0;
            --label:       #606880;
            --accent:      #5a9af5;
            --accent-hover:#3d70e0;
            --tag-bg:      #1f2e52;
            --tag-text:    #6ea8fe;
            --img-bg:      #2c3148;
            --shadow:      rgba(0,0,0,0.32);
            --empty:       #505570;
        }
        [data-theme="light"] {
            --bg:          #f0f2f5;
            --surface:     #ffffff;
            --border:      #e0e0e0;
            --text:        #1a1a1a;
            --text-muted:  #555555;
            --label:       #999999;
            --accent:      #0057d9;
            --accent-hover:#0048b8;
            --tag-bg:      #e8f0fe;
            --tag-text:    #0057d9;
            --img-bg:      #eeeeee;
            --shadow:      rgba(0,0,0,0.08);
            --empty:       #bbbbbb;
        }
        *, *::before, *::after { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px 16px 40px;
            font-size: 15px;
            line-height: 1.5;
        }

        /* ── Top bar ── */
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            max-width: 1100px;
            margin: 0 auto 24px;
        }
        .topbar-title {
            display: flex;
            align-items: center;
            gap: 7px;
            font-size: 1.3rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin: 0;
            color: var(--text);
            text-decoration: none;
        }
        .topbar-title svg { flex-shrink: 0; }
        .search-form {
            flex: 1;
            max-width: 400px;
            display: flex;
        }
        .search-input {
            flex: 1;
            border: 1px solid var(--border);
            border-radius: 20px 0 0 20px;
            padding: 5px 14px;
            font-family: inherit;
            font-size: 0.85rem;
            color: var(--text);
            background: var(--surface);
            outline: none;
            transition: border-color 0.12s;
        }
        .search-input:focus { border-color: var(--accent); }
        .search-input::placeholder { color: var(--label); }
        .search-input::-webkit-search-cancel-button { display: none; }
        .clear-btn {
            display: none;
            align-items: center;
            border: 1px solid var(--border);
            border-left: none;
            border-right: none;
            padding: 5px 9px;
            font-size: 0.8rem;
            line-height: 1;
            cursor: pointer;
            background: var(--surface);
            color: var(--text-muted);
            transition: color 0.12s;
        }
        .clear-btn:hover { color: var(--text); }
        .search-btn {
            border: 1px solid var(--border);
            border-left: none;
            border-radius: 0 20px 20px 0;
            padding: 5px 14px;
            font-family: inherit;
            font-size: 0.85rem;
            cursor: pointer;
            background: var(--surface);
            color: var(--text-muted);
            transition: color 0.12s;
        }
        .search-btn:hover { color: var(--text); }

        #theme-toggle {
            background: var(--surface);
            color: var(--text-muted);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 5px 12px;
            font-size: 0.8rem;
            font-family: inherit;
            cursor: pointer;
        }
        #theme-toggle:hover { color: var(--text); }

        /* ── Card grid ── */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
            max-width: 1100px;
            margin: 0 auto;
        }

        /* ── Card ── */
        .card {
            background: var(--surface);
            border-radius: 10px;
            box-shadow: 0 1px 4px var(--shadow);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            cursor: pointer;
            transition: box-shadow 0.15s, transform 0.15s;
        }
        .card:hover {
            box-shadow: 0 4px 16px var(--shadow);
            transform: translateY(-2px);
        }

        .card-image {
            width: 100%;
            aspect-ratio: 16 / 9;
            object-fit: cover;
            display: block;
            background: var(--img-bg);
        }

        .card-image-placeholder {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: var(--img-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--label);
            font-size: 2rem;
        }

        .card-body {
            padding: 14px 16px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .card-title {
            font-size: 0.95rem;
            font-weight: 600;
            margin: 0;
            line-height: 1.35;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-excerpt {
            font-size: 0.83rem;
            color: var(--text-muted);
            margin: 0;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            white-space: pre-wrap;
            flex: 1;
        }

        .card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
        }
        .card-tag {
            background: var(--tag-bg);
            color: var(--tag-text);
            border-radius: 100px;
            padding: 2px 9px;
            font-size: 0.73rem;
            font-weight: 500;
            white-space: nowrap;
        }

        .card-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 16px 14px;
            border-top: 1px solid var(--border);
        }

        .card-actions {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-edit {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 1.25rem;
            line-height: 1;
        }
        .card-edit:hover { color: var(--accent); }

        .card-delete {
            background: none;
            border: none;
            padding: 0;
            color: var(--text-muted);
            font-size: 1.25rem;
            line-height: 1;
            cursor: pointer;
        }
        .card-delete:hover { color: #e5484d; }

        .card-date {
            font-size: 0.73rem;
            color: var(--label);
            white-space: nowrap;
            flex-shrink: 0;
        }

        /* ── Empty state ── */
        .empty {
            max-width: 1100px;
            margin: 60px auto;
            text-align: center;
            color: var(--empty);
        }
        .empty-icon { font-size: 3rem; margin-bottom: 12px; }
        .empty-heading { font-size: 1.1rem; font-weight: 600; margin: 0 0 6px; color: var(--text-muted); }
        .empty-body { font-size: 0.9rem; margin: 0; }
    </style>
</head>
<body>

<div class="topbar">
    <a class="topbar-title" href="/" title="Home">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 26 18" fill="currentColor" aria-hidden="true" style="width:1.5em;height:1em">
            <path d="M1 14L3 18H23L25 14H1Z"/>
            <rect x="11" y="0" width="1.5" height="14"/>
            <rect x="16.5" y="3" width="1.5" height="11"/>
            <path d="M11 1L11 13L3 12Z"/>
            <path d="M12.5 1L12.5 13L16.5 12L16.5 4Z"/>
            <path d="M18 4L18 13L23 12Z"/>
        </svg>
        Clipper
    </a>
    <form class="search-form" action="/" method="get">
        <input class="search-input" id="search-input" type="search" name="q"
               th:value="${q}"
               placeholder="Search clips&hellip;"
               autocomplete="off">
        <button class="clear-btn" id="search-clear" type="button" aria-label="Clear search">&#x2715;</button>
        <button class="search-btn" type="submit" aria-label="Search">&#x2315;</button>
    </form>
    <button id="theme-toggle" onclick="toggleTheme()"></button>
</div>

<!-- Card grid -->
<div class="grid" th:if="${!posts.isEmpty()}">
    <div class="card"
         th:each="post : ${posts}"
         th:onclick="|window.location='@{/post/{id}(id=${post.id()})}'|"
         role="link" tabindex="0"
         th:attr="aria-label=${!post.ogTitle().isEmpty() ? post.ogTitle() : post.title()}">

        <!-- Primary image (first selected cached image, thumbnail preferred) -->
        <img class="card-image"
             th:if="${post.primaryImage() != null}"
             th:src="${post.primaryImage().effectiveImageUrl()}"
             th:alt="${post.primaryImage().altText()}"
             loading="lazy"
             onerror="this.style.display='none'">
        <div class="card-image-placeholder"
             th:if="${post.primaryImage() == null}">&#128203;</div>

        <div class="card-body">
            <h2 class="card-title"
                th:text="${!post.ogTitle().isEmpty() ? post.ogTitle() : post.title()}"></h2>

            <p class="card-excerpt"
               th:if="${!post.selectedText().isEmpty()}"
               th:text="${post.selectedText()}"></p>
            <p class="card-excerpt"
               th:if="${post.selectedText().isEmpty() && !post.description().isEmpty()}"
               th:text="${post.description()}"></p>

            <div class="card-tags" th:if="${!post.tags().isEmpty()}">
                <span class="card-tag"
                      th:each="tag : ${post.tags()}"
                      th:text="${tag}"></span>
            </div>
        </div>

        <div class="card-footer">
            <span class="card-date"
                  th:text="${post.createdAt().length() >= 10 ? post.createdAt().substring(0, 10) : ''}"></span>
            <div class="card-actions">
                <a class="card-edit"
                   th:href="@{/post/{id}/edit(id=${post.id()})}"
                   onclick="event.stopPropagation()"
                   title="Edit">&#9998;</a>
                <button class="card-delete"
                        type="button"
                        th:attr="data-post-id=${post.id()}"
                        onclick="event.stopPropagation(); deleteCard(this)"
                        title="Delete">&#128465;</button>
            </div>
        </div>
    </div>
</div>

<!-- Empty state: search returned nothing -->
<div class="empty" th:if="${posts.isEmpty() && !q.isEmpty()}">
    <div class="empty-icon">&#128269;</div>
    <p class="empty-heading">No results for &ldquo;<span th:text="${q}"></span>&rdquo;</p>
    <p class="empty-body"><a href="/">Clear search</a></p>
</div>

<!-- Empty state: no clips at all -->
<div class="empty" th:if="${posts.isEmpty() && q.isEmpty()}">
    <div class="empty-icon">&#128203;</div>
    <p class="empty-heading">No clips saved yet</p>
    <p class="empty-body">Use the bookmarklet to clip a page, then submit in the composer.</p>
</div>

<script>
    var _theme = localStorage.getItem('clipper-theme') || 'dark';
    function applyTheme(t) {
        _theme = t;
        document.documentElement.setAttribute('data-theme', t === 'light' ? 'light' : '');
        document.getElementById('theme-toggle').textContent = t === 'light' ? '☾ Dark' : '☀ Light';
        localStorage.setItem('clipper-theme', t);
    }
    function toggleTheme() { applyTheme(_theme === 'light' ? 'dark' : 'light'); }
    applyTheme(_theme);

    /* ── Search: clear button + auto-focus ── */
    var searchInput = document.getElementById('search-input');
    var clearBtn    = document.getElementById('search-clear');

    function updateClear() {
        clearBtn.style.display = searchInput.value ? 'flex' : 'none';
    }

    clearBtn.addEventListener('click', function() {
        window.location.href = '/';
    });

    searchInput.addEventListener('input', updateClear);
    updateClear();

    if (searchInput.value.trim()) searchInput.focus();

    /* ── Delete card ── */
    function deleteCard(btn) {
        var postId = btn.dataset.postId;
        if (!confirm('Delete this clip? This cannot be undone.')) return;
        fetch('/post/' + postId + '/delete', { method: 'POST' })
            .then(function(r) {
                if (!r.ok) throw new Error('Delete failed');
                var card = btn.closest('.card');
                if (card) card.remove();
                if (!document.querySelector('.card')) location.reload();
            })
            .catch(function() { alert('Failed to delete. Please try again.'); });
    }
</script>
</body>
</html>
