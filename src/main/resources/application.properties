server.port=8080
spring.application.name=clipper
spring.thymeleaf.cache=false

clipper.data-dir=${user.home}/.clipper
clipper.image.max-bytes=10485760
clipper.image.connect-timeout-ms=10000
clipper.image.read-timeout-ms=30000
clipper.image.max-redirects=5
clipper.image.allow-private-addresses=false
